<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#e4e4e4;
}

.sidebar{
width:250px;
background:#2f2f2f;
color:white;
padding:10px;
}

.chat-container{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
display:flex;
margin-bottom:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#777;
margin-right:10px;
}

.bubble{
background:white;
padding:10px;
border-radius:10px;
}

.input-area{
display:flex;
padding:10px;
background:#ddd;
}

#messageInput{
flex:1;
padding:10px;
}

button{
padding:10px;
margin-left:5px;
}

.settings{
position:fixed;
right:20px;
top:20px;
background:white;
padding:15px;
border-radius:10px;
display:none;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>Чаты</h3>

<div>Общий чат</div>
<div>Друзья</div>

<br>

<button onclick="openSettings()">⚙ Настройки</button>

</div>

<div class="chat-container">

<div id="messages" class="messages"></div>

<div class="input-area">
<input id="messageInput" placeholder="Сообщение">
<button onclick="sendMessage()">Отправить</button>
</div>

</div>

<div class="settings" id="settings">

<h3>Настройки</h3>

Ник:<br>
<input id="nameInput"><br><br>

Аватарка URL:<br>
<input id="avatarInput"><br><br>

Тема:<br>

<select id="themeSelect">
<option value="light">Светлая</option>
<option value="dark">Темная</option>
</select>

<br><br>

<button onclick="saveSettings()">Сохранить</button>

</div>
