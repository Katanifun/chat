<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#dcdcdc;
display:flex;
height:100vh;
}

/* левая панель */

.sidebar{
width:260px;
background:#2b2b2b;
color:white;
padding:10px;
overflow-y:auto;
}

.chat-item{
padding:12px;
border-radius:8px;
margin-bottom:5px;
cursor:pointer;
background:#3a3a3a;
}

.chat-item:hover{
background:#4a4a4a;
}

/* правая часть */

.chat-container{
flex:1;
display:flex;
flex-direction:column;
background:#e6e6e6;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

/* сообщение */

.message{
display:flex;
align-items:flex-start;
margin-bottom:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#999;
margin-right:10px;
}

.bubble{
background:white;
padding:10px 14px;
border-radius:10px;
max-width:60%;
}

/* поле ввода */

.input-area{
display:flex;
padding:10px;
background:#ddd;
}

#messageInput{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

button{
margin-left:10px;
padding:10px 15px;
border:none;
border-radius:6px;
background:#4caf50;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">

<h3>Чаты</h3>

<div class="chat-item">Общий чат</div>
<div class="chat-item">Друзья</div>
<div class="chat-item">Игры</div>

</div>


<div class="chat-container">

<div id="messages" class="messages"></div>

<div class="input-area">
<input id="messageInput" placeholder="Сообщение...">
<button onclick="sendMessage()">Отправить</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const input = document.getElementById("messageInput");
const messages = document.getElementById("messages");

function sendMessage(){

const text = input.value;

if(text.trim() === "") return;

socket.emit("chat message", text);

input.value="";

}

socket.on("chat message", function(msg){

const message = document.createElement("div");
message.className="message";

message.innerHTML = 
<div class="avatar"></div>
<div class="bubble">${msg}</div>
;

messages.appendChild(message);

messages.scrollTop = messages.scrollHeight;

});

/* отправка через ENTER */

input.addEventListener("keypress", function(e){

if(e.key === "Enter"){
sendMessage();
}

});

</script>

</body>
</html>
